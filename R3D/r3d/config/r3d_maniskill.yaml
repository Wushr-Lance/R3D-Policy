defaults:
  - task: maniskill_PickCube

name: train_r3d_maniskill

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "r3d_maniskill"

# horizon: 4
horizon: 16
n_obs_steps: 2
# n_action_steps: 3
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0
obs_as_global_cond: True

policy:
  _target_: r3d.policy.dp3.DP3
  use_point_crop: true
  condition_type: one_way_transformer # Options: "film", "one_way_transformer"
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true
  
  diffusion_step_embed_dim: 128
  down_dims:
  - 512
  - 1024
  - 2048
  crop_shape:
  - 80
  - 80
  encoder_output_dim: 1024 # could be ignore, will be replaced by pointcloud_encoder_config.embed_dim
  horizon: ${horizon}
  kernel_size: 5
  n_action_steps: ${n_action_steps}
  n_groups: 8
  n_obs_steps: ${n_obs_steps}

  # OneWayTransformer parameters
  transformer_config:
    depth: 4
    embedding_dim: 256
    num_heads: 8
    mlp_dim: 2048

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: sample


  num_inference_steps: 10
  obs_as_global_cond: true
  shape_meta: ${shape_meta}

  use_pc_color: true
  pointnet_type: "uni3d"


  pointcloud_encoder_cfg:
    pc_model: "eva02_tiny_patch14_224"
    pc_feat_dim: 192
    embed_dim: 256
    group_size: 32
    num_group: 512
    patch_dropout: 0 # pointSAM without patch_dropout
    drop_path_rate: 0.2
    pretrained_pc: null # Point transformer in Uni3D is initialized empty
    pc_encoder_dim: 512
    use_pretrained_weights: true
    pretrained_weights_path: R3D/pretrain_weight  # Pretrained weights path
    normalization_type: "layer_norm"  # Options: "batch_norm", "layer_norm", "none"
    feature_mode: "pointsam" # Options: "pointsam", "cls", "max_pooling"

  # FPS randomness config
  fps_random_config:
    use_random: true          # Enable randomness
    random_start: true        # Use random starting point
    random_noise_scale: 0     # Noise scale (0 = no noise)
    shuffle_output: true      # Shuffle output order
  
  use_target_ee: false # remember change action.shape in {task}.yaml when enabling ee prediction
  cat_on_token: false

data_augmentation:
  use_augmentation: true      # Enable data augmentation
  pc_xyz_noise_std: 0.002
  pc_rgb_noise_std: 0
  agent_pos_noise_std: 0.0002  # agent_pos noise std
  
  # Color jitter parameters
  use_color_jitter: true      # Enable color jitter augmentation
  brightness_range: [-0.125, 0.125]   # Brightness range
  contrast_range: [0.5, 1.5]          # Contrast range
  saturation_range: [0.5, 1.5]        # Saturation range


ema:
  _target_: r3d.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 256
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 256
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 3001
  gradient_accumulate_every: 1
  use_ema: True
  use_bfloat16: True
  rollout_every: 50
  checkpoint_every: 50
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
  # DDP related settings
  use_ddp: false
  local_rank: 0

logging:
  group: ${task_name}
  id: null
  mode: online
  name: ${exp_name}
  project: r3d
  resume: true
  tags:
  - r3d
  - maniskill

checkpoint:
  save_ckpt: False # if True, save checkpoint every checkpoint_every
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 1
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True # this only saves when save_ckpt is True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
