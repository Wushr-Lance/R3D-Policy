name: PegInsertionSide

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim
  obs:
    point_cloud:
      shape: [1024, 6]
      type: point_cloud
    agent_pos:
      shape: [9]
      type: low_dim
  action: 
    shape: [8] # 15 when you use auxiliary task; 8 otherwise

env_runner:
  _target_: r3d.env_runner.maniskill_runner.ManiskillRunner
  eval_episodes: 400
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  fps: 10
  n_envs: null
  n_train: null
  n_test: null
  task_name: PegInsertionSide-v0
  device: ${training.device}
  use_point_crop: ${policy.use_point_crop}

dataset:
  _target_: r3d.dataset.maniskill_dataset.ManiskillDataset
  zarr_path: R3D/data/${task.name}-v0.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
  use_data_augmentation: ${data_augmentation.use_augmentation}
  pc_xyz_noise_std: ${data_augmentation.pc_xyz_noise_std}
  pc_rgb_noise_std: ${data_augmentation.pc_rgb_noise_std}
  agent_pos_noise_std: ${data_augmentation.agent_pos_noise_std}
  # Color jitter parameters
  use_color_jitter: ${data_augmentation.use_color_jitter}
  brightness_range: ${data_augmentation.brightness_range}
  contrast_range: ${data_augmentation.contrast_range}
  saturation_range: ${data_augmentation.saturation_range}

  use_target_ee: ${policy.use_target_ee}
